function makeSpots(corners, n) {

  const {tl,tr,br,bl} = corners;

  function borderPt(t) {
    return {
      lx: tl[0]+t*(bl[0]-tl[0]),  ly: tl[1]+t*(bl[1]-tl[1]),
      rx: tr[0]+t*(br[0]-tr[0]),  ry: tr[1]+t*(br[1]-tr[1]),
    };
  }

  const spots = [];
  for (let i = 0; i < n; i++) {
    const p0 = borderPt(i / n);
    const p1 = borderPt((i+1) / n);
  
    const cx = (p0.lx + p0.rx + p1.lx + p1.rx) / 4;
    const cy = (p0.ly + p0.ry + p1.ly + p1.ry) / 4;
  
    const pts = `${p0.lx.toFixed(1)},${p0.ly.toFixed(1)} ` +
                `${p0.rx.toFixed(1)},${p0.ry.toFixed(1)} ` +
                `${p1.rx.toFixed(1)},${p1.ry.toFixed(1)} ` +
                `${p1.lx.toFixed(1)},${p1.ly.toFixed(1)}`;
    spots.push({x:+cx.toFixed(1), y:+cy.toFixed(1), pts, occupied:false, elPoly:null});
  }
  return spots;
}

}

function closestOnPoly(pt,poly){
  let bi=0,bt=0,bd=Infinity;
  for(let i=0;i<poly.length-1;i++){
    const a=poly[i],b=poly[i+1],dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
    if(!l2) continue;
    const t=Math.max(0,Math.min(1,((pt.x-a.x)*dx+(pt.y-a.y)*dy)/l2));
    const d=Math.hypot(pt.x-a.x-dx*t,pt.y-a.y-dy*t);
    if(d<bd){bd=d;bi=i;bt=t;}
  }
  return{i:bi,t:bt,d:bd};
}
function lerpPoly(map,i,t){
  const a=map[i],b=map[Math.min(i+1,map.length-1)];
  return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t};
}
function camToMini(cx,cy){
  const pt={x:cx,y:cy};
  const rA=closestOnPoly(pt,A1),rB=closestOnPoly(pt,B1);
  return rA.d<=rB.d?lerpPoly(A2,rA.i,rA.t):lerpPoly(B2,rB.i,rB.t);
}

  _buildSVG(){
    const g=document.createElementNS(NS,'g'); g.style.display='none';
    const mk=(tag,a)=>{const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;};
    g.appendChild(mk('ellipse',{rx:13,ry:4,cx:0,cy:7,fill:'rgba(0,0,0,0.38)'}));
    g.appendChild(mk('rect',{x:-13,y:-6,width:26,height:12,rx:2.5,
      fill:this.color.body,stroke:this.color.stroke,'stroke-width':1.2}));
    g.appendChild(mk('rect',{x:-6,y:-5,width:13,height:10,rx:1.5,fill:this.color.roof}));
    g.appendChild(mk('rect',{x:-12,y:-5,width:7,height:10,rx:1.2,fill:this.color.ws}));
    g.appendChild(mk('circle',{cx:-12,cy:-4,r:1.5,fill:'#ffffaa'}));
    g.appendChild(mk('circle',{cx:-12,cy: 4,r:1.5,fill:'#ffffaa'}));
    g.appendChild(mk('circle',{cx:12, cy:-4,r:1.4,fill:'#aa0000'}));
    g.appendChild(mk('circle',{cx:12, cy: 4,r:1.4,fill:'#aa0000'}));
    g.setAttribute('filter','url(#glow)');
    document.getElementById('g-cars').appendChild(g); this.el=g;

    const d=document.createElementNS(NS,'g'); d.style.display='none';
    const mkC=(r,f)=>{const c=document.createElementNS(NS,'circle');c.setAttribute('r',r);c.setAttribute('fill',f);return c;}; d.appendChild(mkC('3.5','rgba(0,0,0,0.5)')); d.appendChild(mkC('2.8',this.color.dot));
    document.getElementById('g-minimap-dots').appendChild(d); this.dot=d;
  }

  _newPath(){
    if(this.parkedSpot){setSpotState(this.parkedSpot,false);this.parkedSpot=null;}
    this.parkFrames=0;
    const r=Math.random(), vi=Math.floor(Math.random()*9);
    if(r<0.10){this.pathType=-1;this.pathVia=-1;}       // 10% entrada lateral
    else if(r<0.13){this.pathType=-2;this.pathVia=-1;}  //  3% entrada baixo→560
    else if(r<0.16){this.pathType=-3;this.pathVia=-1;}  //  3% entrada baixo→818
    else if(r<0.18){this.pathType=-4;this.pathVia=-1;}  //  2% entrada baixo→851
    else if(r<0.20){this.pathType=-5;this.pathVia=-1;}  //  2% entrada baixo→1349
    else if(r<0.22){this.pathType=-6;this.pathVia=-1;}  //  2% entrada D→818
    else if(r<0.24){this.pathType=-7;this.pathVia=-1;}  //  2% entrada D→1349
    else if(r<0.60){this.pathType=0;this.pathVia=vi;}   // 36% via L
    else{this.pathType=1;this.pathVia=vi;}               // 40% via U
    this.path=buildPath(this.pathType,this.pathVia);
    this.segIdx=0; this.segDist=0;
    if(this.pathType!==-1 && Math.random()<0.45) this._injectPark();
  }

  _injectPark(){
    const vi=this.pathVia;
    const bi=Math.max(0,Math.min(7,vi-1+(Math.random()<0.5?0:1)));
    const spot=findFreeSpot(bi);
    if(!spot) return;
    let bestI=1,bestD=Infinity;
    for(let i=1;i<this.path.length-1;i++){
      const d=ptDist(this.path[i],spot);
      if(d<bestD){bestD=d;bestI=i;}
    }
    if(bestD>90) return;
    setSpotState(spot,true); this.parkedSpot=spot;
    const wp={x:spot.x,y:spot.y,isPark:true,waitFrames:280+Math.floor(Math.random()*280)};
    this.path=[...this.path.slice(0,bestI+1),wp,...this.path.slice(bestI+1)];
  }

  update(){
    if(!this.active){
      if(++this.timer>=this.delay){
        this.active=true;this._newPath();
        this.x=this.path[0].x;this.y=this.path[0].y;
        this.el.style.display='';this.dot.style.display='';
      }
      return;
    }
    if(this.parkFrames>0){
      if(--this.parkFrames===0&&this.parkedSpot){
        setSpotState(this.parkedSpot,false);this.parkedSpot=null;
      }
      this._render(); return;
    }
    let rem=BASE_SPEED;
    while(rem>0){
      if(this.segIdx>=this.path.length-1){this._newPath();rem=0;break;}
      const p0=this.path[this.segIdx],p1=this.path[this.segIdx+1];
      const len=ptDist(p0,p1)||0.001,toEnd=len-this.segDist;
      if(rem<toEnd){this.segDist+=rem;rem=0;}
      else{
        rem-=toEnd;this.segIdx++;this.segDist=0;
        const cur=this.path[this.segIdx];
        if(cur?.isPark){this.parkFrames=cur.waitFrames;rem=0;}
      }
    }
    if(this.parkFrames===0&&this.segIdx<this.path.length-1){
      const a=this.path[this.segIdx],b=this.path[this.segIdx+1];
      const t=Math.min(1,this.segDist/(ptDist(a,b)||0.001));
      this.x=a.x+(b.x-a.x)*t;this.y=a.y+(b.y-a.y)*t;
      this.angle=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;
    }
    this._render();
  }

  _render(){
    const sc=perspScale(this.y);
    this.el.setAttribute('transform',
      `translate(${this.x.toFixed(1)},${this.y.toFixed(1)}) rotate(${this.angle.toFixed(1)}) scale(${sc.toFixed(3)})`);
    const m=camToMini(this.x,this.y);
    this.dot.setAttribute('transform',`translate(${m.x.toFixed(1)},${m.y.toFixed(1)})`);
  }
}
