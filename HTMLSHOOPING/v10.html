  .hud-sep { width: 1px; height: 40px; background: rgba(0,255,80,.1); flex-shrink: 0; }

  .counter-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 58px;
  }

  .counter-val {
    font-size: 26px;
    font-weight: bold;
    line-height: 1;
    letter-spacing: -1px;
    transition: color .3s;
  }

  .counter-lbl {
    font-size: 7px;
    letter-spacing: 2.5px;
    margin-top: 3px;
    opacity: 0.5;
  }

  .counter-block.occ   .counter-val { color: rgba(255,55,55,.95); }

  }

    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4);

function makeSpots(corners,n){
  const {tl,tr,br,bl}=corners;
  function borderPt(t){
    return{lx:tl[0]+t*(bl[0]-tl[0]),ly:tl[1]+t*(bl[1]-tl[1]),
           rx:tr[0]+t*(br[0]-tr[0]),ry:tr[1]+t*(br[1]-tr[1])};
  }
  const spots=[];
  for(let i=0;i<n;i++){
    const p0=borderPt(i/n),p1=borderPt((i+1)/n);
    const cx=(p0.lx+p0.rx+p1.lx+p1.rx)/4;
    const cy=(p0.ly+p0.ry+p1.ly+p1.ry)/4;
    const pts=`${p0.lx.toFixed(1)},${p0.ly.toFixed(1)} `+
              `${p0.rx.toFixed(1)},${p0.ry.toFixed(1)} `+
              `${p1.rx.toFixed(1)},${p1.ry.toFixed(1)} `+
              `${p1.lx.toFixed(1)},${p1.ly.toFixed(1)}`;
    // Ângulo da vaga: direção do eixo longo (borda esquerda → borda direita)
    const mlx=(p0.lx+p1.lx)/2, mly=(p0.ly+p1.ly)/2;
    const mrx=(p0.rx+p1.rx)/2, mry=(p0.ry+p1.ry)/2;
    const slotAngle=Math.atan2(mry-mly,mrx-mlx)*180/Math.PI;
    spots.push({x:+cx.toFixed(1),y:+cy.toFixed(1),pts,slotAngle,occupied:false,elPoly:null});
  }
  return spots;
}

  SPOTS.forEach(s=>{

    poly.setAttribute('stroke-width','0.8');
    layer.appendChild(poly);
    s.elPoly=poly;
  });
  updateCounter();
}

}

function closestOnPoly(pt,poly){
  let bi=0,bt=0,bd=Infinity;
  for(let i=0;i<poly.length-1;i++){
    const a=poly[i],b=poly[i+1],dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
    if(!l2) continue;
    const t=Math.max(0,Math.min(1,((pt.x-a.x)*dx+(pt.y-a.y)*dy)/l2));
    const d=Math.hypot(pt.x-a.x-dx*t,pt.y-a.y-dy*t);
    if(d<bd){bd=d;bi=i;bt=t;}
  }
  return{i:bi,t:bt,d:bd};
}
function lerpPoly(map,i,t){
  const a=map[i],b=map[Math.min(i+1,map.length-1)];
  return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t};
}
function camToMini(cx,cy){
  const pt={x:cx,y:cy};
  const rA=closestOnPoly(pt,A1),rB=closestOnPoly(pt,B1);
  return rA.d<=rB.d?lerpPoly(A2,rA.i,rA.t):lerpPoly(B2,rB.i,rB.t);
}

function buildPath(type,vi){
  if(type===-1) return[...ENTRY,...LOWER.slice(1)];
  if(type===-2) return[...ENTRY2,...LOWER.slice(5)];
  if(type===-3) return[...ENTRY2,...BRANCH_MAIN.slice(1),...BRANCH_A.slice(1),...LOWER.slice(13)];
  if(type===-4) return[...ENTRY2,...BRANCH_MAIN.slice(1),...BRANCH_B.slice(1)];
  if(type===-5) return[...ENTRY2,...BRANCH_MAIN.slice(1),...BRANCH_C.slice(1)];
  if(type===-6) return[...ENTRY_D,...ENTRY_DA.slice(1),...LOWER.slice(13)];
  if(type===-7) return[...ENTRY_D,...ENTRY_DB.slice(1)];
  if(type===-8) return[...UPPER_EXT,...ENTRY.slice(10),...LOWER.slice(1)];
  if(type===0)  return[...UPPER.slice(0,L_ENTRY_UPPER[vi]+1),...VIAS_L[vi].slice(1)];
  return[...LOWER.slice(0,U_ENTRY_LOWER[vi]+1),...VIAS_U[vi].slice(1),...UPPER.slice(U_EXIT_UPPER[vi]+1)];
}

const COLORS=[
  {body:'#1a44cc',roof:'#0e2580',stroke:'#4d7fff',ws:'rgba(150,205,255,0.55)',dot:'#4d7fff'},
  {body:'#bb2020',roof:'#7a1010',stroke:'#ff5555',ws:'rgba(255,200,180,0.45)',dot:'#ff5555'},
  {body:'#cccccc',roof:'#888888',stroke:'#ffffff',ws:'rgba(200,230,255,0.55)',dot:'#ffffff'},
  {body:'#1a1a1a',roof:'#111111',stroke:'#555555',ws:'rgba(160,200,240,0.45)',dot:'#aaaaaa'},
  {body:'#226622',roof:'#144014',stroke:'#44cc44',ws:'rgba(160,240,180,0.45)',dot:'#44cc44'},
  {body:'#882288',roof:'#551155',stroke:'#cc44cc',ws:'rgba(230,180,240,0.45)',dot:'#cc44cc'},
  {body:'#cc7700',roof:'#884400',stroke:'#ffaa00',ws:'rgba(255,230,160,0.45)',dot:'#ffaa00'},
  {body:'#226688',roof:'#124466',stroke:'#44aacc',ws:'rgba(160,220,240,0.45)',dot:'#44aacc'},
];
let BASE_SPEED=2.0;

class Car{
  constructor(ci,delay){
    this.color=COLORS[ci%COLORS.length]; this.delay=delay; this.timer=0; this.active=false;
    this.path=[]; this.segIdx=0; this.segDist=0;
    this.pathType=-1; this.pathVia=-1;
    this.parkedSpot=null; this.parkFrames=0;
    this.x=UPPER[0].x; this.y=UPPER[0].y; this.angle=0;
    this.el=null; this.dot=null;
    this._buildSVG();
  }

  _buildSVG(){
    const g=document.createElementNS(NS,'g'); g.style.display='none';
    const mk=(tag,a)=>{const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;};
    g.appendChild(mk('ellipse',{rx:13,ry:4,cx:0,cy:7,fill:'rgba(0,0,0,0.38)'}));
    g.appendChild(mk('rect',{x:-13,y:-6,width:26,height:12,rx:2.5,
      fill:this.color.body,stroke:this.color.stroke,'stroke-width':1.2}));
    g.appendChild(mk('rect',{x:-6,y:-5,width:13,height:10,rx:1.5,fill:this.color.roof}));
    g.appendChild(mk('rect',{x:-12,y:-5,width:7,height:10,rx:1.2,fill:this.color.ws}));
    g.appendChild(mk('circle',{cx:-12,cy:-4,r:1.5,fill:'#ffffaa'}));
    g.appendChild(mk('circle',{cx:-12,cy: 4,r:1.5,fill:'#ffffaa'}));
    g.appendChild(mk('circle',{cx:12, cy:-4,r:1.4,fill:'#aa0000'}));
    g.appendChild(mk('circle',{cx:12, cy: 4,r:1.4,fill:'#aa0000'}));
    g.setAttribute('filter','url(#glow)');
    document.getElementById('g-cars').appendChild(g); this.el=g;

    const d=document.createElementNS(NS,'g'); d.style.display='none';
    const mkC=(r,f)=>{const c=document.createElementNS(NS,'circle');c.setAttribute('r',r);c.setAttribute('fill',f);return c;};
    d.appendChild(mkC('3.5','rgba(0,0,0,0.5)')); d.appendChild(mkC('2.8',this.color.dot));
    document.getElementById('g-minimap-dots').appendChild(d); this.dot=d;
  }

  _newPath(){
    if(this.parkedSpot){setSpotState(this.parkedSpot,false);this.parkedSpot=null;}
    this.parkFrames=0;
    const r=Math.random(), vi=Math.floor(Math.random()*9);
    if     (r<0.10){this.pathType=-1;this.pathVia=-1;}
    else if(r<0.13){this.pathType=-2;this.pathVia=-1;}
    else if(r<0.16){this.pathType=-3;this.pathVia=-1;}
    else if(r<0.18){this.pathType=-4;this.pathVia=-1;}
    else if(r<0.20){this.pathType=-5;this.pathVia=-1;}
    else if(r<0.22){this.pathType=-6;this.pathVia=-1;}
    else if(r<0.24){this.pathType=-7;this.pathVia=-1;}
    else if(r<0.27){this.pathType=-8;this.pathVia=-1;}
    else if(r<0.60){this.pathType=0;this.pathVia=vi;}
    else            {this.pathType=1;this.pathVia=vi;}
    this.path=buildPath(this.pathType,this.pathVia);
    this.segIdx=0; this.segDist=0;
    if(Math.random()<0.60) this._injectPark();
  }

  _injectPark(){
    if(this.parkedSpot) return;
    // Procura qualquer vaga livre perto do percurso atual
    const freeSpots=SPOTS.filter(s=>!s.occupied);
    if(!freeSpots.length) return;

    let bestSpot=null, bestI=1, bestD=Infinity;
    for(const spot of freeSpots){
      for(let i=1;i<this.path.length-1;i++){
        const d=ptDist(this.path[i],spot);
        if(d<bestD){bestD=d;bestI=i;bestSpot=spot;}
      }
    }

    if(bestD>90||!bestSpot) return;
    setSpotState(bestSpot,true); this.parkedSpot=bestSpot;

    const from=this.path[bestI];

    // Pontos intermediários para trajetória suave de aproximação
    const ctrl1={
      x: from.x*0.55 + bestSpot.x*0.45,
      y: from.y*0.55 + bestSpot.y*0.45
    };
    const ctrl2={
      x: from.x*0.20 + bestSpot.x*0.80,
      y: from.y*0.20 + bestSpot.y*0.80
    };

    const wp={x:bestSpot.x,y:bestSpot.y,isPark:true,waitFrames:260+Math.floor(Math.random()*300),parkAngle:bestSpot.slotAngle};
    this.path=[...this.path.slice(0,bestI+1), ctrl1, ctrl2, wp, ...this.path.slice(bestI+1)];
  }

  update(){
    if(!this.active){
      if(++this.timer>=this.delay){
        this.active=true;this._newPath();
        this.x=this.path[0].x;this.y=this.path[0].y;
        this.el.style.display='';this.dot.style.display='';
      }
      return;
    }
    if(this.parkFrames>0){
      if(--this.parkFrames===0&&this.parkedSpot){
        setSpotState(this.parkedSpot,false);this.parkedSpot=null;
      }
      this._render(); return;
    }
    let rem=BASE_SPEED;
    while(rem>0){
      if(this.segIdx>=this.path.length-1){this._newPath();rem=0;break;}
      const p0=this.path[this.segIdx],p1=this.path[this.segIdx+1];
      const len=ptDist(p0,p1)||0.001,toEnd=len-this.segDist;
      if(rem<toEnd){this.segDist+=rem;rem=0;}
      else{
        rem-=toEnd;this.segIdx++;this.segDist=0;
        const cur=this.path[this.segIdx];
        if(cur?.isPark){
          this.parkFrames=cur.waitFrames;
          // Posiciona exatamente no centro da vaga
          this.x=cur.x; this.y=cur.y;
          // Escolhe o sentido (0° ou 180°) do ângulo da vaga mais próximo da direção atual
          let pa=cur.parkAngle||0;
          const diff=((pa-this.angle+540)%360)-180;
          if(Math.abs(diff)>90) pa+=180;
          this.angle=pa;
          rem=0;
        }
      }
    }
    if(this.parkFrames===0&&this.segIdx<this.path.length-1){
      const a=this.path[this.segIdx],b=this.path[this.segIdx+1];
      const t=Math.min(1,this.segDist/(ptDist(a,b)||0.001));
      this.x=a.x+(b.x-a.x)*t;this.y=a.y+(b.y-a.y)*t;
      this.angle=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;
    }
    this._render();
  }

  _render(){
    const sc=perspScale(this.y);
    this.el.setAttribute('transform',
      `translate(${this.x.toFixed(1)},${this.y.toFixed(1)}) rotate(${this.angle.toFixed(1)}) scale(${sc.toFixed(3)})`);
    const m=camToMini(this.x,this.y);
    this.dot.setAttribute('transform',`translate(${m.x.toFixed(1)},${m.y.toFixed(1)})`);
  }
}
